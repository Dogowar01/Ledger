<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080808" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BizWidget" />
<title>Business Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --income: #6dbf8a;
  --expense: #e07c7c;
  --text: #e8e8e8;
  --muted: #444;
  --border: #1e1e1e;
  --surface: #111;
}

html, body {
  height: 100%;
  background: #080808;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem 0.6rem;
  flex-shrink: 0;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: #555;
  letter-spacing: 0.04em;
}
.header-date {
  font-size: 0.65rem;
  color: #333;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.refresh-btn {
  background: none;
  border: 1px solid #1e1e1e;
  color: #333;
  border-radius: 6px;
  padding: 0.28rem 0.5rem;
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.15s;
  font-family: inherit;
}
.refresh-btn:hover { color: #888; border-color: #333; }
.refresh-btn:active { transform: rotate(180deg); }

/* ── Combined today strip ── */
.today-strip {
  display: flex;
  gap: 0;
  margin: 0 1.25rem 0.85rem;
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
}
.today-cell {
  flex: 1;
  padding: 0.7rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.18rem;
}
.today-cell + .today-cell {
  border-left: 1px solid #1a1a1a;
}
.tc-label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: #333;
}
.tc-val {
  font-size: 1.05rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.tc-val.income { color: var(--income); }
.tc-val.expense { color: var(--expense); }
.tc-val.net-pos { color: var(--income); }
.tc-val.net-neg { color: var(--expense); }
.tc-val.neutral { color: #888; }

/* ── Business cards ── */
.businesses {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  padding: 0 1.25rem;
  overflow-y: auto;
  min-height: 0;
}

.biz-tile {
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  flex-shrink: 0;
  text-decoration: none;
  display: block;
  position: relative;
}
.biz-tile:active { transform: scale(0.985); }
.biz-tile:hover { border-color: #2a2a2a; }

.biz-accent-bar {
  height: 2px;
  width: 100%;
}

.biz-inner {
  padding: 0.85rem 1rem 0.9rem;
}

.biz-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 0.65rem;
}
.biz-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.01em;
}
.biz-open-hint {
  font-size: 0.6rem;
  color: #282828;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.biz-tile:hover .biz-open-hint { color: #444; }

.biz-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 0.4rem;
}
.biz-stat {
  display: flex;
  flex-direction: column;
  gap: 0.12rem;
}
.bs-label {
  font-size: 0.52rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #333;
}
.bs-val {
  font-size: 0.82rem;
  font-weight: 600;
}
.bs-val.income { color: var(--income); }
.bs-val.expense { color: var(--expense); }
.bs-val.net-pos { color: var(--income); }
.bs-val.net-neg { color: var(--expense); }
.bs-val.neutral { color: #666; }
.bs-val.count { color: #555; }

/* ── Month progress bar ── */
.month-bar-wrap {
  margin-top: 0.6rem;
  padding-top: 0.55rem;
  border-top: 1px solid #161616;
}
.month-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.55rem;
  color: #2e2e2e;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.28rem;
}
.month-bar-track {
  height: 3px;
  background: #1a1a1a;
  border-radius: 2px;
  overflow: hidden;
}
.month-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* ── Footer ── */
.footer {
  padding: 0.6rem 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-top: 1px solid #111;
}
.footer-open-main {
  font-size: 0.65rem;
  color: #2a2a2a;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  text-decoration: none;
  transition: color 0.15s;
}
.footer-open-main:hover { color: #666; }
.footer-updated {
  font-size: 0.58rem;
  color: #222;
}

/* ── Empty state ── */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  color: #2a2a2a;
  font-size: 0.8rem;
  text-align: center;
  padding: 2rem;
}
.empty a {
  color: #444;
  text-decoration: none;
  border: 1px solid #222;
  border-radius: 6px;
  padding: 0.45rem 1rem;
  font-size: 0.75rem;
  transition: all 0.15s;
}
.empty a:hover { color: #888; border-color: #444; }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: none; }
}
.biz-tile { animation: fadeIn 0.3s ease both; }
.biz-tile:nth-child(1) { animation-delay: 0.05s; }
.biz-tile:nth-child(2) { animation-delay: 0.1s; }
.biz-tile:nth-child(3) { animation-delay: 0.15s; }
.biz-tile:nth-child(4) { animation-delay: 0.2s; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <span class="header-title">Signal9 Ledger</span>
    <span class="header-date" id="hdate"></span>
    <button class="refresh-btn" onclick="render()" title="Refresh">↻</button>
  </div>
  <div class="today-strip" id="today-strip"></div>
  <div class="businesses" id="businesses"></div>
  <div class="footer">
    <a class="footer-open-main" href="./index.html">Open Full App →</a>
    <span class="footer-updated" id="updated"></span>
  </div>
</div>

<script>
// ── Config (must match main app) ──
const CURRENCY = { symbol: '$', locale: 'en-AU' };
const FY_START_MONTH = 6; // July

// ── Theme accent colours (matches THEMES in main app) ──
const THEME_ACCENTS = {
  warm:   '#e8a87c',
  ocean:  '#7cb8e8',
  forest: '#7ec89a',
  rose:   '#e8a0b8',
  slate:  '#a0b4c8',
  amber:  '#f0c060',
};

function fmt(n) {
  return CURRENCY.symbol + Math.abs(n).toLocaleString(CURRENCY.locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtSigned(n) { return (n < 0 ? '-' : '+') + fmt(n); }
function fmtShort(n) {
  const abs = Math.abs(n);
  const prefix = CURRENCY.symbol;
  if (abs >= 1000) return (n < 0 ? '-' : '') + prefix + (abs / 1000).toFixed(1) + 'k';
  return (n < 0 ? '-' : '') + prefix + abs.toFixed(0);
}

function today() { return new Date().toISOString().split('T')[0]; }
function thisMonth() { return today().slice(0, 7); }

function getEntries(storageKey) {
  try { return JSON.parse(localStorage.getItem(storageKey + '_entries') || '[]'); } catch { return []; }
}

function calcStats(entries) {
  const todayStr = today();
  const monthStr = thisMonth();

  let todayInc = 0, todayExp = 0;
  let monthInc = 0, monthExp = 0;
  let fyInc = 0, fyExp = 0;

  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth();
  const fyStartYear = mo >= FY_START_MONTH ? yr : yr - 1;
  const fyStart = `${fyStartYear}-${String(FY_START_MONTH + 1).padStart(2, '0')}-01`;

  entries.forEach(e => {
    const amt = Number(e.amount);
    const isInc = e.type === 'income';
    if (e.date === todayStr) { isInc ? (todayInc += amt) : (todayExp += amt); }
    if (e.date.startsWith(monthStr)) { isInc ? (monthInc += amt) : (monthExp += amt); }
    if (e.date >= fyStart) { isInc ? (fyInc += amt) : (fyExp += amt); }
  });

  return {
    today: { income: todayInc, expense: todayExp, net: todayInc - todayExp },
    month: { income: monthInc, expense: monthExp, net: monthInc - monthExp, entries: entries.filter(e => e.date.startsWith(monthStr)).length },
    fy: { income: fyInc, expense: fyExp, net: fyInc - fyExp },
  };
}

function dayOfMonth() {
  return new Date().getDate();
}
function daysInMonth() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
}

function accentFor(biz) {
  return THEME_ACCENTS[biz.themeId] || '#888';
}

function netClass(n) {
  if (n > 0) return 'net-pos';
  if (n < 0) return 'net-neg';
  return 'neutral';
}

function render() {
  // Date header
  const now = new Date();
  document.getElementById('hdate').textContent = now.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
  document.getElementById('updated').textContent = 'Updated ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });

  // Load businesses
  let businesses = [];
  try { businesses = JSON.parse(localStorage.getItem('bt_businesses') || '[]'); } catch {}

  // ── Combined today strip across all businesses ──
  let allTodayInc = 0, allTodayExp = 0, allMonthInc = 0, allMonthExp = 0;
  businesses.forEach(biz => {
    const entries = getEntries(biz.storageKey);
    const s = calcStats(entries);
    allTodayInc += s.today.income;
    allTodayExp += s.today.expense;
    allMonthInc += s.month.income;
    allMonthExp += s.month.expense;
  });
  const allTodayNet = allTodayInc - allTodayExp;
  const allMonthNet = allMonthInc - allMonthExp;

  const stripEl = document.getElementById('today-strip');
  stripEl.innerHTML = `
    <div class="today-cell">
      <span class="tc-label">Today In</span>
      <span class="tc-val income">${allTodayInc > 0 ? fmt(allTodayInc) : '—'}</span>
    </div>
    <div class="today-cell">
      <span class="tc-label">Today Out</span>
      <span class="tc-val expense">${allTodayExp > 0 ? fmt(allTodayExp) : '—'}</span>
    </div>
    <div class="today-cell">
      <span class="tc-label">MTD Net</span>
      <span class="tc-val ${netClass(allMonthNet)}">${allMonthNet !== 0 ? fmtSigned(allMonthNet) : '—'}</span>
    </div>
  `;

  // ── Business tiles ──
  const container = document.getElementById('businesses');

  if (!businesses || businesses.length === 0) {
    container.innerHTML = '';
    container.insertAdjacentHTML('beforeend', `
      <div class="empty">
        <div>No businesses found.<br>Open the main app to set up.</div>
        <a href="./index.html">Open BizTracker →</a>
      </div>
    `);
    return;
  }

  const dayPct = Math.round((dayOfMonth() / daysInMonth()) * 100);

  container.innerHTML = '';
  businesses.forEach((biz, i) => {
    const entries = getEntries(biz.storageKey);
    const s = calcStats(entries);
    const accent = accentFor(biz);

    // Tile links to main app — pass business id as hash so main app could use it
    const href = `./index.html#biz-${biz.id}`;

    const tile = document.createElement('a');
    tile.className = 'biz-tile';
    tile.href = href;
    tile.style.animationDelay = `${i * 0.055}s`;

    tile.innerHTML = `
      <div class="biz-accent-bar" style="background: ${accent};"></div>
      <div class="biz-inner">
        <div class="biz-top">
          <span class="biz-name" style="color: ${accent};">${biz.name}</span>
          <span class="biz-open-hint">Open ↗</span>
        </div>
        <div class="biz-stats">
          <div class="biz-stat">
            <span class="bs-label">Today</span>
            <span class="bs-val ${s.today.net > 0 ? 'net-pos' : s.today.net < 0 ? 'net-neg' : 'neutral'}">${s.today.income > 0 || s.today.expense > 0 ? fmtSigned(s.today.net) : '—'}</span>
          </div>
          <div class="biz-stat">
            <span class="bs-label">MTD In</span>
            <span class="bs-val income">${s.month.income > 0 ? fmt(s.month.income) : '—'}</span>
          </div>
          <div class="biz-stat">
            <span class="bs-label">MTD Out</span>
            <span class="bs-val expense">${s.month.expense > 0 ? fmt(s.month.expense) : '—'}</span>
          </div>
          <div class="biz-stat">
            <span class="bs-label">MTD Net</span>
            <span class="bs-val ${netClass(s.month.net)}">${s.month.net !== 0 ? fmtSigned(s.month.net) : '—'}</span>
          </div>
        </div>
        <div class="month-bar-wrap">
          <div class="month-bar-label">
            <span>Month progress</span>
            <span>${dayOfMonth()} / ${daysInMonth()} days</span>
          </div>
          <div class="month-bar-track">
            <div class="month-bar-fill" style="width: ${dayPct}%; background: ${accent}; opacity: 0.45;"></div>
          </div>
        </div>
      </div>
    `;
    container.appendChild(tile);
  });
}

render();

// Auto-refresh every 60 seconds
setInterval(render, 60000);
</script>
</body>
</html>
