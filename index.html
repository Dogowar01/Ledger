<!DOCTYPE html>
<html lang="en">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Palatino+Linotype:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --s9-bg: #1a1612;
    --s9-surface: rgba(26,22,18,0.88);
    --s9-border: rgba(180,120,60,0.25);
    --s9-accent: #c87941;
    --s9-accent2: #7eb8c9;
    --s9-text: #e8ddd0;
    --s9-muted: #8a7d70;
    --s9-income: #7eb8c9;
    --s9-expense: #c87941;
    --s9-font: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    --s9-font-display: 'IM Fell English', Georgia, serif;

    --ap-bg: #0a0f14;
    --ap-surface: rgba(10,15,20,0.92);
    --ap-border: rgba(0,210,210,0.2);
    --ap-accent: #00d2d2;
    --ap-accent2: #ff6b35;
    --ap-text: #c8e8e8;
    --ap-muted: #4a7070;
    --ap-income: #00d2d2;
    --ap-expense: #ff6b35;
    --ap-font: 'Courier Prime', 'Courier New', monospace;
    --ap-font-display: 'Courier Prime', monospace;
  }
  html, body { height: 100%; }
  body { font-family: sans-serif; background: #111; color: #eee; }

  /* LANDING */
  #landing {
    display: flex; min-height: 100vh;
  }
  .biz-panel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: flex 0.4s ease; position: relative; overflow: hidden;
    padding: 40px 30px;
  }
  .biz-panel:hover { flex: 1.3; }
  .biz-panel .divider-line {
    position: absolute; top: 0; bottom: 0; right: 0; width: 1px;
    background: linear-gradient(to bottom, #c87941, #00d2d2);
  }
  /* S9 Panel */
  .s9-panel {
    background: var(--s9-bg);
    background-image: var(--s9-artwork-bg, none);
    background-size: cover; background-position: center;
  }
  .s9-panel::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(26,22,18,0.35) 0%, rgba(26,22,18,0.75) 100%);
  }
  .s9-panel .panel-content { position: relative; z-index: 1; text-align: center; }
  .s9-panel h1 {
    font-family: var(--s9-font-display); font-size: 2.8rem;
    color: var(--s9-text); letter-spacing: 0.04em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    margin-bottom: 8px;
  }
  .s9-panel .sub { font-family: var(--s9-font); font-size: 0.85rem;
    color: var(--s9-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; }
  .s9-panel .enter-btn {
    font-family: var(--s9-font); font-size: 0.9rem; letter-spacing: 0.15em;
    color: var(--s9-accent); border: 1px solid var(--s9-accent);
    background: rgba(200,121,65,0.1); padding: 10px 28px;
    cursor: pointer; transition: all 0.2s;
    text-transform: uppercase;
  }
  .s9-panel .enter-btn:hover { background: rgba(200,121,65,0.2); }
  .s9-panel .summary-row { margin-top: 24px; display: flex; gap: 24px; }
  .s9-panel .sum-item { text-align: center; }
  .s9-panel .sum-label { font-family: var(--s9-font); font-size: 0.7rem;
    color: var(--s9-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .s9-panel .sum-val { font-family: var(--s9-font-display); font-size: 1.4rem; }
  .s9-panel .sum-val.income { color: var(--s9-income); }
  .s9-panel .sum-val.expense { color: var(--s9-expense); }
  .s9-panel .sum-val.net.pos { color: var(--s9-income); }
  .s9-panel .sum-val.net.neg { color: var(--s9-expense); }

  /* APP SALES Panel */
  .ap-panel {
    background: var(--ap-bg);
    background-image: var(--ap-artwork-bg, none);
    background-size: cover; background-position: center;
  }
  .ap-panel::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(10,15,20,0.4) 0%, rgba(10,15,20,0.78) 100%);
  }
  .ap-panel .panel-content { position: relative; z-index: 1; text-align: center; }
  .ap-panel h1 {
    font-family: var(--ap-font-display); font-size: 1.4rem; font-weight: 700;
    color: var(--ap-accent); letter-spacing: 0.2em; text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0,210,210,0.5);
    margin-bottom: 4px;
  }
  .ap-panel .sys-line {
    font-family: var(--ap-font); font-size: 0.7rem; color: var(--ap-muted);
    letter-spacing: 0.08em; margin-bottom: 28px;
  }
  .ap-panel .enter-btn {
    font-family: var(--ap-font); font-size: 0.85rem; letter-spacing: 0.15em;
    color: var(--ap-accent); border: 1px solid var(--ap-accent);
    background: rgba(0,210,210,0.08); padding: 10px 28px;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .ap-panel .enter-btn:hover { background: rgba(0,210,210,0.15); box-shadow: 0 0 12px rgba(0,210,210,0.2); }
  .ap-panel .summary-row { margin-top: 24px; display: flex; gap: 24px; }
  .ap-panel .sum-item { text-align: center; }
  .ap-panel .sum-label { font-family: var(--ap-font); font-size: 0.65rem;
    color: var(--ap-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .ap-panel .sum-val { font-family: var(--ap-font); font-size: 1.3rem; font-weight: 700; }
  .ap-panel .sum-val.income { color: var(--ap-income); text-shadow: 0 0 8px rgba(0,210,210,0.4); }
  .ap-panel .sum-val.expense { color: var(--ap-expense); }
  .ap-panel .sum-val.net.pos { color: var(--ap-income); }
  .ap-panel .sum-val.net.neg { color: var(--ap-expense); }

  /* LEDGER VIEW */
  .ledger-view {
    min-height: 100vh;
    padding: 0;
  }
  .ledger-view.s9 {
    background: var(--s9-bg);
    background-image: var(--s9-artwork-bg, none);
    background-size: cover; background-position: center; background-attachment: fixed;
    font-family: var(--s9-font);
    color: var(--s9-text);
  }
  .ledger-view.s9::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(26,22,18,0.55) 0%, rgba(26,22,18,0.88) 100%);
    pointer-events: none;
  }
  .ledger-view.ap {
    background: var(--ap-bg);
    background-image: var(--ap-artwork-bg,
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,210,210,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,210,210,0.03) 40px));
    background-size: cover; background-position: center; background-attachment: fixed;
    font-family: var(--ap-font);
    color: var(--ap-text);
  }
  .ledger-inner { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

  /* HEADER */
  .ledger-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .back-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px 8px; transition: opacity 0.2s; }
  .s9 .back-btn { color: var(--s9-accent); font-family: var(--s9-font); }
  .ap .back-btn { color: var(--ap-accent); font-family: var(--ap-font); }
  .back-btn:hover { opacity: 0.7; }
  .ledger-title { flex: 1; }
  .s9 .ledger-title h2 { font-family: var(--s9-font-display); font-size: 2rem; color: var(--s9-text); }
  .ap .ledger-title h2 { font-family: var(--ap-font); font-size: 1.2rem; color: var(--ap-accent); text-transform: uppercase; letter-spacing: 0.2em; text-shadow: 0 0 12px rgba(0,210,210,0.4); }
  .s9 .ledger-title .sub { font-size: 0.8rem; color: var(--s9-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .ap .ledger-title .sub { font-size: 0.7rem; color: var(--ap-muted); letter-spacing: 0.08em; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* BUTTONS */
  .btn {
    padding: 8px 16px; border: 1px solid; cursor: pointer; font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; background: transparent;
  }
  .s9 .btn { font-family: var(--s9-font); color: var(--s9-accent); border-color: var(--s9-border); }
  .s9 .btn:hover { border-color: var(--s9-accent); background: rgba(200,121,65,0.1); }
  .s9 .btn.primary { color: var(--s9-bg); background: var(--s9-accent); border-color: var(--s9-accent); }
  .ap .btn { font-family: var(--ap-font); color: var(--ap-accent); border-color: var(--ap-border); }
  .ap .btn:hover { border-color: var(--ap-accent); background: rgba(0,210,210,0.1); box-shadow: 0 0 8px rgba(0,210,210,0.15); }
  .ap .btn.primary { color: var(--ap-bg); background: var(--ap-accent); border-color: var(--ap-accent); }
  .btn.danger { color: #e05555 !important; border-color: rgba(224,85,85,0.3) !important; }
  .btn.danger:hover { background: rgba(224,85,85,0.1) !important; border-color: #e05555 !important; }
  .btn.success { color: #5ec98c !important; border-color: rgba(94,201,140,0.3) !important; }
  .btn.success:hover { background: rgba(94,201,140,0.1) !important; border-color: #5ec98c !important; }

  /* SUMMARY STRIP */
  .summary-strip {
    display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .sum-card {
    flex: 1; min-width: 120px; padding: 16px 20px; border: 1px solid;
  }
  .s9 .sum-card { background: var(--s9-surface); border-color: var(--s9-border); }
  .ap .sum-card { background: var(--ap-surface); border-color: var(--ap-border); }
  .sum-card .sc-label { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .s9 .sum-card .sc-label { color: var(--s9-muted); }
  .ap .sum-card .sc-label { color: var(--ap-muted); }
  .sum-card .sc-val { font-size: 1.5rem; }
  .s9 .sum-card .sc-val { font-family: var(--s9-font-display); }
  .sc-val.income { color: var(--s9-income); }
  .ap .sc-val.income { color: var(--ap-income); }
  .sc-val.expense { color: var(--s9-expense); }
  .ap .sc-val.expense { color: var(--ap-expense); }
  .sc-val.net.pos { color: var(--s9-income); }
  .ap .sc-val.net.pos { color: var(--ap-income); }
  .sc-val.net.neg { color: var(--s9-expense); }
  .ap .sc-val.net.neg { color: var(--ap-expense); }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-input {
    background: transparent; border: 1px solid; padding: 7px 12px; font-size: 0.82rem;
    outline: none; flex: 1; min-width: 140px; transition: border-color 0.2s;
  }
  .s9 .filter-input { font-family: var(--s9-font); color: var(--s9-text); border-color: var(--s9-border); }
  .s9 .filter-input:focus { border-color: var(--s9-accent); }
  .ap .filter-input { font-family: var(--ap-font); color: var(--ap-text); border-color: var(--ap-border); }
  .ap .filter-input:focus { border-color: var(--ap-accent); }
  .filter-input::placeholder { opacity: 0.4; }
  select.filter-input option { background: #1a1612; }
  .ap select.filter-input option { background: #0a0f14; }

  /* ENTRY FORM */
  .entry-form {
    border: 1px solid; padding: 20px; margin-bottom: 24px;
  }
  .s9 .entry-form { background: var(--s9-surface); border-color: var(--s9-border); }
  .ap .entry-form { background: var(--ap-surface); border-color: var(--ap-border); }
  .form-title { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .s9 .form-title { color: var(--s9-muted); font-family: var(--s9-font); }
  .ap .form-title { color: var(--ap-muted); }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .s9 .form-label { color: var(--s9-muted); }
  .ap .form-label { color: var(--ap-muted); }
  .form-input {
    background: transparent; border: 1px solid; padding: 8px 10px; font-size: 0.88rem;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  .s9 .form-input { font-family: var(--s9-font); color: var(--s9-text); border-color: var(--s9-border); }
  .s9 .form-input:focus { border-color: var(--s9-accent); }
  .ap .form-input { font-family: var(--ap-font); color: var(--ap-text); border-color: var(--ap-border); }
  .ap .form-input:focus { border-color: var(--ap-accent); }
  .form-input::placeholder { opacity: 0.35; }
  select.form-input option { background: #1a1612; }
  .ap select.form-input option { background: #0a0f14; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ENTRIES LIST */
  .entries-list { display: flex; flex-direction: column; gap: 1px; }
  .entry-row {
    display: grid; grid-template-columns: 90px 1fr 120px 90px 90px;
    gap: 12px; align-items: center; padding: 12px 16px; border: 1px solid transparent;
    transition: all 0.15s;
  }
  .s9 .entry-row { background: rgba(26,22,18,0.7); border-bottom-color: var(--s9-border); }
  .s9 .entry-row:hover { background: rgba(200,121,65,0.06); border-color: var(--s9-border); }
  .ap .entry-row { background: rgba(10,15,20,0.8); border-bottom-color: var(--ap-border); }
  .ap .entry-row:hover { background: rgba(0,210,210,0.04); border-color: var(--ap-border); }
  .entry-date { font-size: 0.75rem; opacity: 0.55; }
  .entry-desc { font-size: 0.88rem; }
  .s9 .entry-cat-tag { font-size: 0.7rem; color: var(--s9-muted); font-style: italic; }
  .ap .entry-cat-tag { font-size: 0.65rem; color: var(--ap-muted); letter-spacing: 0.06em; }
  .entry-note { font-size: 0.72rem; opacity: 0.45; margin-top: 3px; }
  .entry-amount { font-size: 1rem; text-align: right; }
  .entry-amount.income { color: var(--s9-income); }
  .ap .entry-amount.income { color: var(--ap-income); }
  .entry-amount.expense { color: var(--s9-expense); }
  .ap .entry-amount.expense { color: var(--ap-expense); }
  .entry-type { font-size: 0.7rem; text-align: center; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; }
  .entry-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 0.95rem; opacity: 0.4; transition: opacity 0.2s; padding: 2px 4px; }
  .icon-btn:hover { opacity: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-box {
    border: 1px solid; padding: 32px; max-width: 420px; width: 100%;
  }
  .s9 .modal-box { background: #1e1a15; border-color: var(--s9-border); font-family: var(--s9-font); color: var(--s9-text); }
  .ap .modal-box { background: #0e141a; border-color: var(--ap-border); font-family: var(--ap-font); color: var(--ap-text); }
  .modal-title { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
  .s9 .modal-title { color: var(--s9-accent); font-family: var(--s9-font-display); }
  .ap .modal-title { color: var(--ap-accent); }
  .modal-body { font-size: 0.88rem; margin-bottom: 24px; opacity: 0.8; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* IMPORT/EXPORT SECTION */
  .io-section {
    margin-top: 32px; border: 1px solid; padding: 20px;
  }
  .s9 .io-section { background: var(--s9-surface); border-color: var(--s9-border); }
  .ap .io-section { background: var(--ap-surface); border-color: var(--ap-border); }
  .io-title { font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; }
  .s9 .io-title { color: var(--s9-muted); }
  .ap .io-title { color: var(--ap-muted); }
  .io-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .io-hint { font-size: 0.72rem; opacity: 0.45; margin-top: 8px; line-height: 1.5; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 60px 20px; opacity: 0.35; }
  .s9 .empty-state { font-family: var(--s9-font-display); font-style: italic; font-size: 1.1rem; }
  .ap .empty-state { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    padding: 12px 20px; font-size: 0.82rem; letter-spacing: 0.08em;
    border: 1px solid; animation: toastIn 0.2s ease;
  }
  .s9 .toast { font-family: var(--s9-font); background: #1e1a15; border-color: var(--s9-accent); color: var(--s9-accent); }
  .ap .toast { font-family: var(--ap-font); background: #0e141a; border-color: var(--ap-accent); color: var(--ap-accent); box-shadow: 0 0 16px rgba(0,210,210,0.2); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    #landing { flex-direction: column; }
    .entry-row { grid-template-columns: 1fr 80px; }
    .entry-date, .entry-type, .entry-actions { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!--
  ============================================================
  SIGNAL9 ARTWORK BACKGROUND
  ============================================================
  To embed your artwork, open a terminal and run:

    python3 -c "
    import base64
    with open('your-artwork.jpg','rb') as f:
        data = base64.b64encode(f.read()).decode()
    print('data:image/jpeg;base64,' + data[:40] + '...')
    with open('b64.txt','w') as out:
        out.write('data:image/jpeg;base64,' + data)

const fmtAUD = (n) => '$' + Math.abs(n).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

const getMonthOptions = () => {
  const opts = [{ value: 'all', label: 'All Months' }];
  const now = new Date();
  for (let i = 0; i < 24; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleString('en-AU', { month: 'long', year: 'numeric' });
    opts.push({ value: val, label });
  }
  return opts;
};

const getFYOptions = () => {
  const opts = [{ value: 'all', label: 'All Financial Years' }];
  const now = new Date();
  const currentFY = now.getMonth() >= 6 ? now.getFullYear() : now.getFullYear() - 1;
  for (let y = currentFY; y >= currentFY - 4; y--) {
    opts.push({ value: String(y), label: `FY ${y}/${String(y+1).slice(-2)}` });
  }
  return opts;
};

const getFY = (dateStr) => {
  const d = new Date(dateStr);
  return d.getMonth() >= 6 ? d.getFullYear() : d.getFullYear() - 1;
};

function useEntries(biz) {
  const [entries, setEntries] = useState(() => {
    try { return JSON.parse(localStorage.getItem(biz.storageKey) || '[]'); } catch { return []; }
  });
  const [cats, setCats] = useState(() => {
    try { return JSON.parse(localStorage.getItem(biz.catStorageKey) || JSON.stringify(biz.defaultCats)); } catch { return biz.defaultCats; }
  });

  useEffect(() => { localStorage.setItem(biz.storageKey, JSON.stringify(entries)); }, [entries, biz.storageKey]);
  useEffect(() => { localStorage.setItem(biz.catStorageKey, JSON.stringify(cats)); }, [cats, biz.catStorageKey]);

  const addEntry = (e) => setEntries(prev => [{ ...e, id: Date.now() + Math.random() }, ...prev]);
  const updateEntry = (id, data) => setEntries(prev => prev.map(e => e.id === id ? { ...e, ...data } : e));
  const deleteEntry = (id) => setEntries(prev => prev.filter(e => e.id !== id));
  const importEntries = (newEntries) => setEntries(newEntries);

  return { entries, cats, setCats, addEntry, updateEntry, deleteEntry, importEntries };
}

function summarise(entries) {
  const income = entries.filter(e => e.type === 'income').reduce((s,e) => s + Number(e.amount), 0);
  const expense = entries.filter(e => e.type === 'expense').reduce((s,e) => s + Number(e.amount), 0);
  return { income, expense, net: income - expense };
}

function Landing({ onSelect }) {
  const s9entries = (() => { try { return JSON.parse(localStorage.getItem('biz_tracker_s9') || '[]'); } catch { return []; } })();
  const apentries = (() => { try { return JSON.parse(localStorage.getItem('biz_tracker_ap') || '[]'); } catch { return []; } })();
  const s9sum = summarise(s9entries);
  const apsum = summarise(apentries);

  const artStyle = S9_ARTWORK ? { '--s9-artwork-bg': `url("${S9_ARTWORK}")` } : {};

  return (
    <div id="landing">
      <div className="biz-panel s9-panel" style={artStyle} onClick={() => onSelect('s9')}>
        <div className="panel-content">
          <h1>Signal9</h1>
          <div className="sub">Fine Art Studio — Tasmania</div>
          <button className="enter-btn">Open Ledger</button>
          {s9entries.length > 0 && (
            <div className="summary-row">
              <div className="sum-item"><div className="sum-label">Income</div><div className="sum-val income">{fmtAUD(s9sum.income)}</div></div>
              <div className="sum-item"><div className="sum-label">Outgoings</div><div className="sum-val expense">{fmtAUD(s9sum.expense)}</div></div>
              <div className="sum-item"><div className="sum-label">Net</div><div className={`sum-val net ${s9sum.net >= 0 ? 'pos' : 'neg'}`}>{s9sum.net >= 0 ? '' : '−'}{fmtAUD(s9sum.net)}</div></div>
            </div>
          )}
        </div>
        <div className="divider-line" />
      </div>
      <div className="biz-panel ap-panel" style={AP_ARTWORK ? {'--ap-artwork-bg': `url("${AP_ARTWORK}")`} : {}} onClick={() => onSelect('ap')}>
        <div className="panel-content">
          <h1>APP_SALES</h1>
          <div className="sys-line">SYS:LEDGER // STATUS:ACTIVE // ENTITY:KIRK</div>
          <button className="enter-btn">[OPEN_LEDGER]</button>
          {apentries.length > 0 && (
            <div className="summary-row">
              <div className="sum-item"><div className="sum-label">INCOME</div><div className="sum-val income">{fmtAUD(apsum.income)}</div></div>
              <div className="sum-item"><div className="sum-label">EXPENSE</div><div className="sum-val expense">{fmtAUD(apsum.expense)}</div></div>
              <div className="sum-item"><div className="sum-label">NET</div><div className={`sum-val net ${apsum.net >= 0 ? 'pos' : 'neg'}`}>{apsum.net >= 0 ? '' : '−'}{fmtAUD(apsum.net)}</div></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---- ENTRY FORM ----
function EntryForm({ biz, cats, onAdd, onCancel, editData }) {
  const today = new Date().toISOString().slice(0,10);
  const blank = { type: 'income', description: '', amount: '', category: cats[0] || '', date: today, notes: '' };
  const [form, setForm] = useState(editData || blank);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const submit = () => {
    if (!form.description.trim() || !form.amount || isNaN(Number(form.amount))) return;
    onAdd({ ...form, amount: Number(form.amount) });
    if (!editData) setForm(blank);
  };

  const isS9 = biz.theme === 's9';
  const typeLabel = isS9 ? 'Type' : 'TXN_TYPE';
  const descLabel = isS9 ? 'Description' : 'DESCRIPTION';
  const amtLabel = isS9 ? 'Amount (AUD)' : 'AMOUNT_AUD';
  const catLabel = isS9 ? 'Category' : 'CATEGORY';
  const dateLabel = isS9 ? 'Date' : 'DATE';
  const notesLabel = isS9 ? 'Notes (optional)' : 'NOTES';

  return (
    <div className="entry-form">
      <div className="form-title">{editData ? (isS9 ? 'Edit Entry' : 'EDIT_ENTRY') : (isS9 ? 'New Entry' : '[+_NEW_ENTRY]')}</div>
      <div className="form-grid">
        <div className="form-field">
          <label className="form-label">{typeLabel}</label>
          <select className="form-input" value={form.type} onChange={e => set('type', e.target.value)}>
            <option value="income">{isS9 ? 'Income' : 'INCOME'}</option>
            <option value="expense">{isS9 ? 'Expense' : 'EXPENSE'}</option>
          </select>
        </div>
        <div className="form-field" style={{gridColumn: 'span 2'}}>
          <label className="form-label">{descLabel}</label>
          <input className="form-input" value={form.description} onChange={e => set('description', e.target.value)} placeholder={isS9 ? 'What was this…' : 'ENTRY_DESCRIPTION'} />
        </div>
        <div className="form-field">
          <label className="form-label">{amtLabel}</label>
          <input className="form-input" type="number" step="0.01" min="0" value={form.amount} onChange={e => set('amount', e.target.value)} placeholder="0.00" />
        </div>
        <div className="form-field">
          <label className="form-label">{catLabel}</label>
          <select className="form-input" value={form.category} onChange={e => set('category', e.target.value)}>
            {cats.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="form-field">
          <label className="form-label">{dateLabel}</label>
          <input className="form-input" type="date" value={form.date} onChange={e => set('date', e.target.value)} />
        </div>
        <div className="form-field" style={{gridColumn: 'span 2'}}>
          <label className="form-label">{notesLabel}</label>
          <input className="form-input" value={form.notes} onChange={e => set('notes', e.target.value)} placeholder={isS9 ? 'Any extra detail…' : 'NOTES_OPTIONAL'} />
        </div>
      </div>
      <div className="form-actions">
        {onCancel && <button className="btn" onClick={onCancel}>{isS9 ? 'Cancel' : 'CANCEL'}</button>}
        <button className="btn primary" onClick={submit}>{editData ? (isS9 ? 'Save Changes' : 'SAVE_CHANGES') : (isS9 ? 'Add Entry' : 'ADD_ENTRY')}</button>
      </div>
    </div>
  );
}

// ---- IMPORT / EXPORT ----
function ImportExport({ biz, entries, cats, onImport, showToast }) {
  const fileRef = useRef();
  const isS9 = biz.theme === 's9';

  const exportJSON = () => {
    const payload = { business: biz.id, exportedAt: new Date().toISOString(), categories: cats, entries };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `${biz.id}-tracker-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast(isS9 ? 'Exported successfully' : 'EXPORT_OK');
  };

  const exportCSV = () => {
    const rows = [['Date','Type','Description','Category','Amount','Notes']];
    [...entries].sort((a,b) => a.date < b.date ? 1 : -1).forEach(e => {
      rows.push([e.date, e.type, `"${e.description}"`, e.category, (e.type==='expense'?'-':'')+e.amount, `"${e.notes||''}"`]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `${biz.id}-tracker-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showToast(isS9 ? 'CSV exported' : 'CSV_EXPORT_OK');
  };

  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.entries || !Array.isArray(data.entries)) throw new Error('Invalid format');
        if (data.business && data.business !== biz.id) {
          if (!confirm(`This file is from "${data.business}" — import into ${biz.name} anyway?`)) return;
        }
        onImport(data.entries);
        showToast(isS9 ? `Imported ${data.entries.length} entries` : `IMPORTED_${data.entries.length}_ENTRIES`);
      } catch { showToast('Error: invalid JSON file'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div className="io-section">
      <div className="io-title">{isS9 ? 'Import / Export' : 'DATA_IO'}</div>
      <div className="io-row">
        <button className="btn success" onClick={exportJSON}>{isS9 ? 'Export JSON' : 'EXPORT_JSON'}</button>
        <button className="btn" onClick={exportCSV}>{isS9 ? 'Export CSV' : 'EXPORT_CSV'}</button>
        <button className="btn" onClick={() => fileRef.current.click()}>{isS9 ? 'Import JSON' : 'IMPORT_JSON'}</button>
        <input type="file" accept=".json" ref={fileRef} style={{display:'none'}} onChange={handleImport} />
      </div>
      <div className="io-hint">
        {isS9
          ? 'Export JSON to back up all entries and restore them on any device. CSV is for spreadsheets. Importing replaces all current entries.'
          : 'JSON: full backup+restore // CSV: spreadsheet use // IMPORT overwrites current data'}
      </div>
    </div>
  );
}

// ---- CONFIRM MODAL ----
function ConfirmModal({ biz, message, onConfirm, onCancel }) {
  const isS9 = biz.theme === 's9';
  return (
    <div className={`modal-overlay ${biz.theme}`}>
      <div className="modal-box">
        <div className="modal-title">{isS9 ? 'Confirm' : 'CONFIRM_ACTION'}</div>
        <div className="modal-body">{message}</div>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>{isS9 ? 'Cancel' : 'CANCEL'}</button>
          <button className="btn danger" onClick={onConfirm}>{isS9 ? 'Delete' : 'CONFIRM_DELETE'}</button>
        </div>
      </div>
    </div>
  );
}

// ---- LEDGER ----
function Ledger({ bizId, onBack }) {
  const biz = BUSINESSES[bizId];
  const { entries, cats, setCats, addEntry, updateEntry, deleteEntry, importEntries } = useEntries(biz);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [filterMonth, setFilterMonth] = useState('all');
  const [filterFY, setFilterFY] = useState('all');
  const [filterType, setFilterType] = useState('all');
  const [filterCat, setFilterCat] = useState('all');
  const [search, setSearch] = useState('');
  const [sortAsc, setSortAsc] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [toast, setToast] = useState(null);
  const [newCat, setNewCat] = useState('');
  const toastTimer = useRef();

  const isS9 = biz.theme === 's9';

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }, []);

  const filtered = entries.filter(e => {
    if (filterMonth !== 'all') {
      const em = e.date.slice(0,7); if (em !== filterMonth) return false;
    }
    if (filterFY !== 'all') {
      if (String(getFY(e.date)) !== filterFY) return false;
    }
    if (filterType !== 'all' && e.type !== filterType) return false;
    if (filterCat !== 'all' && e.category !== filterCat) return false;
    if (search.trim()) {
      const q = search.toLowerCase();
      if (!(e.description.toLowerCase().includes(q) || (e.notes||'').toLowerCase().includes(q) || e.category.toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a,b) => sortAsc ? (a.date > b.date ? 1 : -1) : (a.date < b.date ? 1 : -1));

  const sum = summarise(filtered);
  const monthOpts = getMonthOptions();
  const fyOpts = getFYOptions();

  const handleAdd = (data) => { addEntry(data); setShowForm(false); showToast(isS9 ? 'Entry added' : 'ENTRY_ADDED'); };
  const handleEdit = (data) => { updateEntry(editId, data); setEditId(null); showToast(isS9 ? 'Entry updated' : 'ENTRY_UPDATED'); };
  const handleDeleteConfirm = () => { deleteEntry(confirmDelete); setConfirmDelete(null); showToast(isS9 ? 'Entry deleted' : 'ENTRY_DELETED'); };

  const artStyle = isS9 && S9_ARTWORK ? { '--s9-artwork-bg': `url("${S9_ARTWORK}")` } : (!isS9 && AP_ARTWORK ? { '--ap-artwork-bg': `url("${AP_ARTWORK}")` } : {});

  return (
    <div className={`ledger-view ${biz.theme}`} style={artStyle}>
      <div className="ledger-inner">
        <div className="ledger-header">
          <button className="back-btn" onClick={onBack}>← {isS9 ? 'Back' : 'BACK'}</button>
          <div className="ledger-title">
            <h2>{isS9 ? 'Signal9 Studio' : 'APP_SALES_LEDGER'}</h2>
            <div className="sub">{isS9 ? 'Income & Expense Ledger' : `SYS:TRACKER // ENTRIES:${entries.length}`}</div>
          </div>
          <div className="header-actions">
            <button className="btn" onClick={() => setSortAsc(p => !p)}>{isS9 ? (sortAsc ? 'Oldest First' : 'Newest First') : (sortAsc ? 'ASC' : 'DESC')}</button>
            <button className="btn primary" onClick={() => { setShowForm(p => !p); setEditId(null); }}>
              {isS9 ? (showForm ? 'Close' : '+ New Entry') : (showForm ? 'CLOSE' : '[+_NEW]')}
            </button>
          </div>
        </div>

        {showForm && !editId && <EntryForm biz={biz} cats={cats} onAdd={handleAdd} onCancel={() => setShowForm(false)} />}

        <div className="summary-strip">
          <div className="sum-card"><div className="sc-label">{isS9 ? 'Income' : 'INCOME'}</div><div className="sc-val income">{fmtAUD(sum.income)}</div></div>
          <div className="sum-card"><div className="sc-label">{isS9 ? 'Outgoings' : 'EXPENSE'}</div><div className="sc-val expense">{fmtAUD(sum.expense)}</div></div>
          <div className="sum-card"><div className="sc-label">{isS9 ? 'Net' : 'NET'}</div><div className={`sc-val net ${sum.net >= 0 ? 'pos' : 'neg'}`}>{sum.net >= 0 ? '' : '−'}{fmtAUD(sum.net)}</div></div>
          <div className="sum-card"><div className="sc-label">{isS9 ? 'Entries' : 'ENTRIES'}</div><div className="sc-val" style={{fontSize:'1.2rem',opacity:0.8}}>{filtered.length} / {entries.length}</div></div>
        </div>

        <div className="filters">
          <input className="filter-input" placeholder={isS9 ? 'Search…' : 'SEARCH'} value={search} onChange={e => setSearch(e.target.value)} style={{maxWidth:180}} />
          <select className="filter-input" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} style={{maxWidth:180}}>
            {monthOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <select className="filter-input" value={filterFY} onChange={e => setFilterFY(e.target.value)} style={{maxWidth:160}}>
            {fyOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <select className="filter-input" value={filterType} onChange={e => setFilterType(e.target.value)} style={{maxWidth:130}}>
            <option value="all">{isS9 ? 'All Types' : 'ALL_TYPES'}</option>
            <option value="income">{isS9 ? 'Income' : 'INCOME'}</option>
            <option value="expense">{isS9 ? 'Expense' : 'EXPENSE'}</option>
          </select>
          <select className="filter-input" value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{maxWidth:160}}>
            <option value="all">{isS9 ? 'All Categories' : 'ALL_CATS'}</option>
            {cats.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>

        <div className="entries-list">
          {filtered.length === 0 && <div className="empty-state">{isS9 ? 'No entries yet — the ledger awaits.' : 'NO_ENTRIES // LEDGER_EMPTY'}</div>}
          {filtered.map(e => (
            editId === e.id
              ? <EntryForm key={e.id} biz={biz} cats={cats} editData={e} onAdd={handleEdit} onCancel={() => setEditId(null)} />
              : (
                <div key={e.id} className="entry-row">
                  <div className="entry-date">{e.date}</div>
                  <div>
                    <div className="entry-desc">{e.description}</div>
                    <div className="entry-cat-tag">{e.category}</div>
                    {e.notes && <div className="entry-note">{e.notes}</div>}
                  </div>
                  <div className={`entry-amount ${e.type}`}>{e.type === 'expense' ? '−' : '+'}{fmtAUD(e.amount)}</div>
                  <div className="entry-type">{e.type}</div>
                  <div className="entry-actions">
                    <button className="icon-btn" title="Edit" onClick={() => { setEditId(e.id); setShowForm(false); }}>✎</button>
                    <button className="icon-btn" title="Delete" onClick={() => setConfirmDelete(e.id)}>✕</button>
                  </div>
                </div>
              )
          ))}
        </div>

        <ImportExport biz={biz} entries={entries} cats={cats} onImport={importEntries} showToast={showToast} />

        <div className="io-section" style={{marginTop:16}}>
          <div className="io-title">{isS9 ? 'Manage Categories' : 'MANAGE_CATEGORIES'}</div>
          <div className="io-row" style={{flexWrap:'wrap', gap:8, marginBottom:10}}>
            {cats.map(c => (
              <span key={c} style={{
                padding:'4px 10px', border:'1px solid', fontSize:'0.78rem',
                borderColor: isS9 ? 'var(--s9-border)' : 'var(--ap-border)',
                display:'flex', alignItems:'center', gap:6
              }}>
                {c}
                {cats.length > 1 && <button className="icon-btn" style={{fontSize:'0.65rem',opacity:0.35}} onClick={() => setCats(p => p.filter(x => x !== c))}>✕</button>}
              </span>
            ))}
          </div>
          <div className="io-row">
            <input className="filter-input" style={{maxWidth:220}} placeholder={isS9 ? 'New category…' : 'NEW_CATEGORY'} value={newCat} onChange={e => setNewCat(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter' && newCat.trim()) { setCats(p => [...p, newCat.trim()]); setNewCat(''); }}} />
            <button className="btn" onClick={() => { if (newCat.trim()) { setCats(p => [...p, newCat.trim()]); setNewCat(''); }}}>
              {isS9 ? '+ Add' : 'ADD_CAT'}
            </button>
          </div>
        </div>
      </div>

      {confirmDelete && (
        <ConfirmModal biz={biz}
          message={isS9 ? 'Delete this entry? This cannot be undone.' : 'CONFIRM: DELETE_ENTRY // IRREVERSIBLE'}
          onConfirm={handleDeleteConfirm}
          onCancel={() => setConfirmDelete(null)} />
      )}
      {toast && <div className={`toast ${biz.theme}`}>{toast}</div>}
    </div>
  );
}

// ---- APP ROOT ----
function App() {
  const [view, setView] = useState('landing');
  return view === 'landing'
    ? <Landing onSelect={setView} />
    : <Ledger bizId={view} onBack={() => setView('landing')} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
